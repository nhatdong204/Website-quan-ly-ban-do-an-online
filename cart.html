<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body{font-family:Arial;padding:20px;background:#f9f9f9;}
        h1{margin-bottom:20px;}
        .cart-item{display:flex; justify-content:space-between; margin-bottom:10px; background:#fff; padding:10px; border-radius:5px;}
        button{padding:5px 10px; border:none; background:#dc3545; color:#fff; border-radius:3px; cursor:pointer;}
        button:hover{background:#c82333;}
        .total{margin-top:20px;font-weight:bold;}
        .quantity-btn{padding:2px 6px; background:#007bff; color:#fff; border-radius:3px; margin:0 3px; cursor:pointer;}
        .quantity-btn:hover{background:#0056b3;}
    </style>
</head>
<body>
    <h1>Giỏ hàng của bạn</h1>
    <div id="cart-list"></div>
    <p class="total" id="total-price"></p>
    <button onclick="clearCart()">Xóa tất cả</button>
    <button onclick="checkout()">Thanh toán</button>

    <script src="js/cart.js"></script>
</body>
</html>
