<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Food App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header>
    <h1>🍔 Food App</h1>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="menu.html">Món ăn</a>
        <a href="login.html">Đăng nhập</a>
        <a href="signup.html">Đăng ký</a>
    </nav>
</header>

<section class="auth-container">
    <div class="auth-box" style="max-width: 420px;">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-lock-open" style="font-size: 40px; color: #ff5722;"></i>
            </div>
            <h2 class="auth-title">Quên mật khẩu?</h2>
            <p class="text-muted">Không sao, chúng tôi sẽ giúp bạn lấy lại mật khẩu</p>
        </div>
        
        <form id="forgotForm" class="auth-form">
            <div class="mb-3">
                <label for="email" class="form-label">Email hoặc Tên đăng nhập</label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-control form-control-lg"
                    placeholder="abc@gmail.com"
                    required>
                <small class="text-muted d-block mt-2">
                    <i class="fas fa-info-circle"></i> Nhập email hoặc tên đăng nhập của bạn. Chúng tôi sẽ gửi link reset mật khẩu
                </small>
            </div>

            <button type="submit" class="btn btn-orange btn-lg w-100 mb-3 fw-bold">
                <i class="fas fa-paper-plane me-2"></i>Gửi link reset
            </button>
        </form>

        <div class="text-center">
            <p class="text-muted mb-0 small">Nhớ mật khẩu rồi? <a href="login.html" class="text-orange text-decoration-none fw-bold">Đăng nhập</a></p>
        </div>
    </div>
</section>

<footer>
    <div class="footer-container">
        <p>&copy; 2026 Food App. Bản quyền được bảo vệ.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('forgotForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value;

        if (email) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-check-circle me-2"></i>
                <strong>Thành công!</strong> Link reset mật khẩu đã được gửi đến <strong>${email}</strong>. Vui lòng kiểm tra email của bạn (kể cả thư mục spam).
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            
            // Sau 3 giây, chuyển hướng
            setTimeout(() => {
                // window.location.href = 'login.html';
            }, 3000);

            // Reset form
            document.getElementById('forgotForm').reset();
        }
    });
</script>

</body>
</html>

<script>
function logout(e) {
    if (e) e.preventDefault();
    if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userData');
        alert('Bạn đã đăng xuất thành công!');
        window.location.href = 'index.html';
    }
}

function checkLoginStatus() {
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const profileLink = document.getElementById('profileLink');
    const logoutLink = document.getElementById('logoutLink');
    if (isLoggedIn === 'true') {
        if (profileLink) profileLink.style.display = 'block';
        if (logoutLink) logoutLink.style.display = 'block';
    }
}

window.addEventListener('load', checkLoginStatus);
</script>
