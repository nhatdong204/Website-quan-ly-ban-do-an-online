<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Food App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header>
    <h1>🍔 Food App</h1>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="menu.html">Món ăn</a>
        <a href="signup.html" class="active">Đăng ký</a>
        <a href="profile.html" id="profileLink" style="display: none;">Tài khoản</a>
        <a href="#" id="logoutLink" style="display: none;" onclick="logout(event)">Đăng xuất</a>
    </nav>
</header>

<section class="auth-container">
    <div class="auth-box signup-box">
        <div class="text-center mb-4">
            <h1 class="brand-title">🍔 Food App</h1>
            <h2 class="auth-title">Tạo tài khoản mới</h2>
            <p class="text-muted">Bắt đầu đặt hàng ngay</p>
        </div>
        
        <form id="signupForm" class="auth-form" action="#" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="fullname" class="form-label">Họ và tên <span class="text-danger">*</span></label>
                    <input 
                        type="text" 
                        id="fullname" 
                        name="fullname" 
                        class="form-control form-control-lg"
                        placeholder="Nguyễn Văn A"
                        required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Số điện thoại <span class="text-danger">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        class="form-control form-control-lg"
                        placeholder="0904123456"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <label for="email-signup" class="form-label">Email <span class="text-danger">*</span></label>
                <input 
                    type="email" 
                    id="email-signup" 
                    name="email" 
                    class="form-control form-control-lg"
                    placeholder="abc@gmail.com"
                    required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="password-signup" class="form-label">Mật khẩu <span class="text-danger">*</span></label>
                    <input 
                        type="password" 
                        id="password-signup" 
                        name="password" 
                        class="form-control form-control-lg"
                        placeholder="Tối thiểu 6 ký tự"
                        minlength="6"
                        required>
                    <small class="d-block text-muted mt-1"><i class="fas fa-info-circle"></i> Ít nhất 6 ký tự</small>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="password-confirm" class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                    <input 
                        type="password" 
                        id="password-confirm" 
                        name="password_confirm" 
                        class="form-control form-control-lg"
                        placeholder="Xác nhận mật khẩu"
                        required>
                </div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label">Địa chỉ giao hàng</label>
                <textarea 
                    id="address" 
                    name="address" 
                    class="form-control form-control-lg"
                    placeholder="Nhập địa chỉ giao hàng chi tiết"
                    rows="3"></textarea>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="agree" name="agree" required>
                <label class="form-check-label" for="agree">
                    Tôi đồng ý với <a href="#" class="text-orange text-decoration-none">Điều khoản dịch vụ</a> và <a href="#" class="text-orange text-decoration-none">Chính sách bảo mật</a>
                </label>
            </div>

            <button type="submit" class="btn btn-orange btn-lg w-100 mb-3 fw-bold">Tạo tài khoản</button>
        </form>

        <div class="text-center mb-3">
            <p class="mb-0">Đã có tài khoản? <a href="login.html" class="text-orange text-decoration-none fw-bold">Đăng nhập tại đây</a></p>
        </div>

        <div class="position-relative mb-3">
            <hr>
            <span class="position-absolute top-50 start-50 translate-middle bg-white px-2 text-muted">HOẶC</span>
        </div>

        <div class="d-grid gap-2">
            <button type="button" class="btn btn-outline-primary btn-lg social-btn facebook-btn">
                <i class="fab fa-facebook-f me-2"></i>
                <span>Đăng ký với Facebook</span>
            </button>
            <button type="button" class="btn btn-outline-danger btn-lg social-btn google-btn">
                <i class="fab fa-google me-2"></i>
                <span>Đăng ký với Google</span>
            </button>
        </div>
    </div>
</section>

<footer>
    <div class="footer-container">
        <p>&copy; 2026 Food App. Bản quyền được bảo vệ.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Kiểm tra đã đăng nhập chưa
    function checkLoginStatus() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const profileLink = document.getElementById('profileLink');
        const logoutLink = document.getElementById('logoutLink');

        if (isLoggedIn === 'true') {
            profileLink.style.display = 'block';
            logoutLink.style.display = 'block';
        }
    }

    // Đăng xuất
    function logout(e) {
        if (e) e.preventDefault();
        
        if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userData');
            alert('Bạn đã đăng xuất thành công!');
            window.location.href = 'index.html';
        }
    }

    // Real-time password validation
    document.getElementById('password-confirm').addEventListener('input', function() {
        const pwd = document.getElementById('password-signup').value;
        const pwdConfirm = this.value;
        
        if (pwd && pwdConfirm && pwd !== pwdConfirm) {
            this.classList.add('is-invalid');
            this.classList.remove('is-valid');
        } else if (pwd && pwdConfirm && pwd === pwdConfirm) {
            this.classList.add('is-valid');
            this.classList.remove('is-invalid');
        } else {
            this.classList.remove('is-invalid', 'is-valid');
        }
    });

    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fullname = document.getElementById('fullname').value;
        const email = document.getElementById('email-signup').value;
        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password-signup').value;
        const passwordConfirm = document.getElementById('password-confirm').value;
        const agree = document.getElementById('agree').checked;

        // Kiểm tra mật khẩu khớp
        if (password !== passwordConfirm) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-exclamation-circle me-2"></i>
                <strong>Lỗi!</strong> Mật khẩu không khớp!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            return;
        }

        // Kiểm tra đã đồng ý
        if (!agree) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-warning alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>Chú ý!</strong> Vui lòng đồng ý với điều khoản sử dụng!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            return;
        }

        // Kiểm tra số điện thoại
        if (phone.length < 10) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-exclamation-circle me-2"></i>
                <strong>Lỗi!</strong> Số điện thoại không hợp lệ!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            return;
        }

        if (fullname && email && phone && password) {
            // Lưu thông tin người dùng
            const userData = {
                fullname,
                email,
                phone,
                isLoggedIn: true
            };

            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userData', JSON.stringify(userData));

            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-check-circle me-2"></i>
                <strong>Thành công!</strong> Tài khoản của bạn đã được tạo. Chào mừng, <strong>${fullname}</strong>!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);

            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 2000);
        }
    });

    // Social login handlers
    document.querySelector('.facebook-btn').addEventListener('click', function() {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-info alert-dismissible fade show';
        alertDiv.innerHTML = `
            <i class="fab fa-facebook-f me-2"></i>
            Chuyển hướng đến Facebook. Tính năng này cần cấu hình backend OAuth.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.insertBefore(alertDiv, document.body.firstChild);
    });

    document.querySelector('.google-btn').addEventListener('click', function() {
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-info alert-dismissible fade show';
        alertDiv.innerHTML = `
            <i class="fab fa-google me-2"></i>
            Chuyển hướng đến Google. Tính năng này cần cấu hình backend OAuth.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.insertBefore(alertDiv, document.body.firstChild);
    });

    // Check login status khi trang load
    window.addEventListener('load', checkLoginStatus);
</script>

</body>
</html>
