<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Food App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<header>
    <h1>🍔 Food App</h1>
    <nav>
        <a href="index.html">Trang chủ</a>
        <a href="menu.html">Món ăn</a>
        <a href="login.html">Đăng nhập</a>
        <a href="signup.html">Đăng ký</a>
    </nav>
</header>

<section class="auth-container">
    <div class="auth-box" style="max-width: 450px;">
        <div class="text-center mb-4">
            <div class="mb-3">
                <i class="fas fa-key" style="font-size: 40px; color: #ff5722;"></i>
            </div>
            <h2 class="auth-title">Đặt lại mật khẩu</h2>
            <p class="text-muted">Tạo mật khẩu mới cho tài khoản của bạn</p>
        </div>
        
        <form id="resetForm" class="auth-form">
            <div class="mb-3">
                <label for="new-password" class="form-label">Mật khẩu mới <span class="text-danger">*</span></label>
                <input 
                    type="password" 
                    id="new-password" 
                    class="form-control form-control-lg"
                    placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)"
                    minlength="6"
                    required>
                <small class="d-block text-muted mt-1">
                    <i class="fas fa-info-circle"></i> Mật khẩu phải có ít nhất 6 ký tự
                </small>
            </div>

            <div class="mb-3">
                <label for="confirm-password" class="form-label">Xác nhận mật khẩu <span class="text-danger">*</span></label>
                <input 
                    type="password" 
                    id="confirm-password" 
                    class="form-control form-control-lg"
                    placeholder="Xác nhận mật khẩu"
                    required>
            </div>

            <div class="progress mb-3" style="height: 5px;">
                <div id="passwordStrength" class="progress-bar bg-danger" role="progressbar" style="width: 0%"></div>
            </div>
            <small id="strengthText" class="text-danger d-block mb-3">Mật khẩu yếu</small>

            <button type="submit" class="btn btn-orange btn-lg w-100 mb-3 fw-bold">
                <i class="fas fa-save me-2"></i>Lưu mật khẩu mới
            </button>
        </form>

        <div class="text-center">
            <p class="text-muted mb-0 small">Quay lại <a href="login.html" class="text-orange text-decoration-none fw-bold">Đăng nhập</a></p>
        </div>
    </div>
</section>

<footer>
    <div class="footer-container">
        <p>&copy; 2026 Food App. Bản quyền được bảo vệ.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const newPwdInput = document.getElementById('new-password');
    const confirmPwdInput = document.getElementById('confirm-password');
    const strengthBar = document.getElementById('passwordStrength');
    const strengthText = document.getElementById('strengthText');

    // Kiểm tra độ mạnh mật khẩu
    newPwdInput.addEventListener('input', function() {
        const pwd = this.value;
        let strength = 0;
        let text = 'Mật khẩu yếu';
        let color = 'bg-danger';

        if (pwd.length >= 6) strength++;
        if (pwd.length >= 8) strength++;
        if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
        if (/[0-9]/.test(pwd)) strength++;
        if (/[!@#$%^&*]/.test(pwd)) strength++;

        if (strength <= 1) {
            text = 'Mật khẩu yếu';
            color = 'bg-danger';
            strengthBar.style.width = '20%';
        } else if (strength <= 2) {
            text = 'Mật khẩu trung bình';
            color = 'bg-warning';
            strengthBar.style.width = '40%';
        } else if (strength <= 3) {
            text = 'Mật khẩu khá tốt';
            color = 'bg-info';
            strengthBar.style.width = '60%';
        } else if (strength <= 4) {
            text = 'Mật khẩu mạnh';
            color = 'bg-success';
            strengthBar.style.width = '80%';
        } else {
            text = 'Mật khẩu rất mạnh';
            color = 'bg-success';
            strengthBar.style.width = '100%';
        }

        strengthBar.className = `progress-bar ${color}`;
        strengthText.textContent = text;
        strengthText.className = `text-${color.replace('bg-', '')} d-block mb-3`;
    });

    // Xác nhận mật khẩu real-time
    confirmPwdInput.addEventListener('input', function() {
        const pwd = newPwdInput.value;
        const pwdConfirm = this.value;
        
        if (pwd && pwdConfirm && pwd !== pwdConfirm) {
            this.classList.add('is-invalid');
            this.classList.remove('is-valid');
        } else if (pwd && pwdConfirm && pwd === pwdConfirm) {
            this.classList.add('is-valid');
            this.classList.remove('is-invalid');
        } else {
            this.classList.remove('is-invalid', 'is-valid');
        }
    });

    document.getElementById('resetForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newPwd = document.getElementById('new-password').value;
        const confirmPwd = document.getElementById('confirm-password').value;

        if (newPwd !== confirmPwd) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-exclamation-circle me-2"></i>
                <strong>Lỗi!</strong> Mật khẩu không khớp!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            return;
        }

        if (newPwd.length < 6) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-warning alert-dismissible fade show';
            alertDiv.innerHTML = `
                <i class="fas fa-exclamation-triangle me-2"></i>
                <strong>Chú ý!</strong> Mật khẩu phải có ít nhất 6 ký tự!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.insertBefore(alertDiv, document.body.firstChild);
            return;
        }

        // Reset thành công
        const alertDiv = document.createElement('div');
        alertDiv.className = 'alert alert-success alert-dismissible fade show';
        alertDiv.innerHTML = `
            <i class="fas fa-check-circle me-2"></i>
            <strong>Thành công!</strong> Mật khẩu của bạn đã được cập nhật. Đang chuyển hướng...
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        `;
        document.body.insertBefore(alertDiv, document.body.firstChild);

        // Reset form
        document.getElementById('resetForm').reset();
        strengthBar.style.width = '0%';
        strengthText.textContent = 'Mật khẩu yếu';

        // Sau 2 giây, chuyển hướng
        setTimeout(() => {
            window.location.href = 'login.html';
        }, 2000);
    });
</script>

</body>
</html>

<script>
function logout(e) {
    if (e) e.preventDefault();
    if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('userData');
        alert('Bạn đã đăng xuất thành công!');
        window.location.href = 'index.html';
    }
}

function checkLoginStatus() {
    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const profileLink = document.getElementById('profileLink');
    const logoutLink = document.getElementById('logoutLink');
    if (isLoggedIn === 'true') {
        if (profileLink) profileLink.style.display = 'block';
        if (logoutLink) logoutLink.style.display = 'block';
    }
}

window.addEventListener('load', checkLoginStatus);
</script>
